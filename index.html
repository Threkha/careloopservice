<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Careloop - Casual Healthcare Services</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    font-family:"Times New Roman", Times, serif !important;
    box-sizing:border-box;
}

body{
    margin:0;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;
}

header{
    background:white;
    padding:15px 40px;
    position:sticky;
    top:0;
    z-index:100;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
    align-items:center;
}

nav a{
    text-decoration:none;
    font-weight:bold;
    color:#667eea;
}

section{
    padding:60px 20px;
    text-align:center;
    color:white;
}

.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    margin-top:40px;
}

.service-card{
    background:white;
    padding:30px;
    border-radius:15px;
    cursor:pointer;
    color:#333;
    transition:0.3s;
}

.service-card:hover{
    transform:translateY(-8px);
}

.contact-box{
    background:white;
    color:#333;
    padding:30px;
    border-radius:15px;
    display:inline-block;
    margin-top:30px;
}

.contact-box a{
    display:block;
    margin:10px 0;
    color:#667eea;
    font-weight:bold;
    text-decoration:none;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:30px;
    border-radius:15px;
    width:90%;
    max-width:500px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    background:#667eea;
    color:white;
    padding:12px;
    border:none;
    cursor:pointer;
}

.success{
    color:green;
    margin-top:10px;
}

footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}

/* ===== SHARE MARKET SECTION STYLE ===== */
.share-section{
    background:white;
    padding:40px;
    border-radius:20px;
    max-width:800px;
    margin:40px auto;
    color:black;
}

#sharePrice{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}
</style>
</head>
<body>

<header>
<nav>
<div><b>Careloop</b></div>
<ul>
<li><a href="#home" id="navHome">ホーム</a></li>
<li><a href="#services" id="navServices">サービス</a></li>
<li><a href="#contact" id="navContact">お問い合わせ</a></li>
<li>
<select id="langSelect">
<option value="ja" selected>日本語</option>
<option value="en">English</option>
</select>
</li>
</ul>
</nav>
</header>

<section id="home">
<h1 id="homeTitle">ケアループへようこそ</h1>
</section>

<!-- ===== NEW SHARE VALUE SECTION ADDED ===== -->
<section>
<div class="share-section">
<h2>📈 Careloop Share Value (Live)</h2>
<div id="sharePrice">₹ 500</div>
<canvas id="shareChart"></canvas>
</div>
</section>
<!-- ===== END SHARE VALUE SECTION ===== -->

<section id="services">
<div class="services">
<div class="service-card" onclick="openForm('doorstep')">
<h3 id="doorTitle">🚚 訪問診療</h3>
</div>

<div class="service-card" onclick="openForm('doctor')">
<h3 id="docTitle">👨‍⚕️ 医師相談</h3>
</div>

<div class="service-card" onclick="openForm('physio')">
<h3 id="phyTitle">💪 理学療法</h3>
</div>
</div>
</section>

<section id="contact">
<h2 id="contactTitle">お問い合わせ</h2>

<div class="contact-box">
<a href="tel:+918838397429" id="contactPhone">📞 +91 88383 97429</a>
<a href="mailto:careloop2026@gmail.com" id="contactEmail">📧 careloop2026@gmail.com</a>
<a href="https://www.instagram.com/_.careloop._?igsh=czRzYTVjbjhra251" target="_blank" id="contactInsta">📷 Instagram</a>
</div>
</section>

<!-- MODAL FORM (UNCHANGED) -->
<div class="modal" id="formModal">
<div class="modal-content">
<h2 id="formTitle"></h2>
<form id="serviceForm">
<div id="formFields"></div>
<button type="submit" id="submitBtn"></button>
<p class="success" id="successMsg"></p>
</form>
</div>
</div>

<footer>
<p id="footerText">© 2026 ケアループ. 全著作権所有。</p>
</footer>

<script>

/* ===== REAL TIME SHARE VALUE SCRIPT ===== */

let sharePrice = 500;
let labels = [];
let dataPoints = [];

const ctx = document.getElementById('shareChart').getContext('2d');

const shareChart = new Chart(ctx, {
type: 'line',
data: {
labels: labels,
datasets: [{
label: 'Careloop Share Price',
data: dataPoints,
borderColor: '#667eea',
fill: false,
tension: 0.3
}]
},
options: {
responsive: true,
scales: {
y: {
beginAtZero: false
}
}
}
});

function updateSharePrice(){
let randomChange = (Math.random() * 10 - 5); 
sharePrice += randomChange;

sharePrice = Math.max(100, sharePrice); 

document.getElementById("sharePrice").textContent = "₹ " + sharePrice.toFixed(2);

let time = new Date().toLocaleTimeString();
labels.push(time);
dataPoints.push(sharePrice);

if(labels.length > 20){
labels.shift();
dataPoints.shift();
}

shareChart.update();
}

setInterval(updateSharePrice,1000);

/* ===== YOUR ORIGINAL SCRIPT CONTINUES BELOW (UNCHANGED) ===== */

const translations={
ja:{
navHome:"ホーム",
navServices:"サービス",
navContact:"お問い合わせ",
homeTitle:"ケアループへようこそ",
doorTitle:"🚚 訪問診療",
docTitle:"👨‍⚕️ 医師相談",
phyTitle:"💪 理学療法",
contactTitle:"お問い合わせ",
contactPhone:"📞 電話: +91 88383 97429",
contactEmail:"📧 メール: careloop2026@gmail.com",
contactInsta:"📷 インスタグラム",
footerText:"© 2026 ケアループ. 全著作権所有。",
submit:"送信",
success:"送信が成功しました！"
},
en:{
navHome:"Home",
navServices:"Services",
navContact:"Contact",
homeTitle:"Welcome to Careloop",
doorTitle:"🚚 Doorstep Visit",
docTitle:"👨‍⚕️ Doctor Consultation",
phyTitle:"💪 Physiotherapy",
contactTitle:"Contact Us",
contactPhone:"📞 Mobile: +91 88383 97429",
contactEmail:"📧 Email: careloop2026@gmail.com",
contactInsta:"📷 Instagram",
footerText:"© 2026 Careloop. All rights reserved.",
submit:"Submit",
success:"Submitted successfully!"
}
};

let currentLang="ja";

document.getElementById("langSelect").addEventListener("change",function(){
currentLang=this.value;
changeLanguage();
});

function changeLanguage(){
document.documentElement.lang=currentLang;
for(let key in translations[currentLang]){
if(document.getElementById(key)){
document.getElementById(key).textContent=translations[currentLang][key];
}
}
}

changeLanguage();

/* Form Logic remains exactly same */
function openForm(type){
document.getElementById("formModal").style.display="flex";
document.getElementById("successMsg").textContent="";
let fields="";

if(type==="doorstep"){
document.getElementById("formTitle").textContent=currentLang==="ja"?"訪問診療":"Doorstep Visit";
fields=`<input required placeholder="${currentLang==="ja"?"名前":"Name"}">`;
}

document.getElementById("formFields").innerHTML=fields;
document.getElementById("submitBtn").textContent=translations[currentLang].submit;
}

document.getElementById("serviceForm").addEventListener("submit",function(e){
e.preventDefault();
document.getElementById("successMsg").textContent=translations[currentLang].success;
this.reset();
});

window.onclick=function(e){
if(e.target===document.getElementById("formModal")){
document.getElementById("formModal").style.display="none";
}
};

</script>

</body>
</html>
