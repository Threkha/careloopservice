<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Careloop - Casual Healthcare Services</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>

<style>
*{
    font-family:"Times New Roman", Times, serif !important;
    box-sizing:border-box;
}

body{
    margin:0;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;
}

header{
    background:white;
    padding:15px 40px;
    position:sticky;
    top:0;
    z-index:100;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
    align-items:center;
}

nav a{
    text-decoration:none;
    font-weight:bold;
    color:#667eea;
}

section{
    padding:60px 20px;
    text-align:center;
    color:white;
}

.share-section{
    background:white;
    padding:40px;
    border-radius:20px;
    max-width:1000px;
    margin:40px auto;
    color:black;
}

footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>

<header>
<nav>
<div><b>Careloop</b></div>
<ul>
<li><a href="#home">ホーム</a></li>
<li><a href="#services">サービス</a></li>
<li><a href="#contact">お問い合わせ</a></li>
</ul>
</nav>
</header>

<section id="home">
<h1>ケアループへようこそ</h1>
</section>

<!-- ===== NSE STYLE SHARE MARKET SECTION ===== -->
<section>
<div class="share-section">
<h2>NSE: CARELOOP (Care Service Company)</h2>
<p>Chart Period: 2024 - 2026</p>
<canvas id="candleChart"></canvas>
</div>
</section>

<footer>
<p>© 2026 ケアループ. 全著作権所有。</p>
</footer>

<script>

/* ===============================
   REALISTIC MONTHLY DATA (2024-2026)
================================ */

function generateMonthlyData() {

    let data = [];
    let price = 350; // START JAN 2024

    let months = 30; // Jan 2024 → Jun 2026 approx

    for(let i=0;i<months;i++){

        // gradual trend
        let growthBias = 2; 
        let volatility = 10;

        // 2025 peak simulation
        if(i > 10 && i < 16){
            growthBias = 20;
        }

        // post peak correction gradual
        if(i >=16 && i <22){
            growthBias = -15;
        }

        // 2026 recovery
        if(i >=22){
            growthBias = 5;
        }

        let open = price;
        let close = open + (Math.random()*volatility - volatility/2) + growthBias;
        let high = Math.max(open, close) + Math.random()*10;
        let low = Math.min(open, close) - Math.random()*10;

        price = close;

        data.push({
            x: new Date(2024, i, 1),
            o: parseFloat(open.toFixed(2)),
            h: parseFloat(high.toFixed(2)),
            l: parseFloat(low.toFixed(2)),
            c: parseFloat(close.toFixed(2))
        });
    }

    return data;
}

let candleData = generateMonthlyData();

/* ===============================
   CHART CONFIGURATION
================================ */

const ctx = document.getElementById('candleChart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'candlestick',
    data: {
        datasets: [{
            label: 'CARELOOP Share Price',
            data: candleData,
            color: {
                up: '#2e7d32',
                down: '#c62828',
                unchanged: '#999'
            }
        }]
    },
    options: {
        responsive: true,
        scales: {
            x: {
                type: 'time',
                time: {
                    unit: 'month'
                }
            },
            y: {
                beginAtZero: false
            }
        }
    }
});

/* ===============================
   LIVE REAL TIME MOVEMENT (per second)
================================ */

setInterval(() => {

    let last = candleData[candleData.length - 1];
    let lastClose = last.c;

    let smallMove = (Math.random() - 0.5) * 5; // small fluctuation only

    let newCandle = {
        x: new Date(),
        o: lastClose,
        h: lastClose + Math.random()*5,
        l: lastClose - Math.random()*5,
        c: parseFloat((lastClose + smallMove).toFixed(2))
    };

    candleData.push(newCandle);

    if(candleData.length > 40){
        candleData.shift();
    }

    chart.update();

}, 1000);

</script>

</body>
</html>
