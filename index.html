<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Careloop - Casual Healthcare Services</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
    font-family:"Times New Roman", Times, serif !important;
    box-sizing:border-box;
}

body{
    margin:0;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;
}

header{
    background:white;
    padding:15px 40px;
    position:sticky;
    top:0;
    z-index:100;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
    align-items:center;
}

nav a{
    text-decoration:none;
    font-weight:bold;
    color:#667eea;
}

section{
    padding:60px 20px;
    text-align:center;
    color:white;
}

.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    margin-top:40px;
}

.service-card{
    background:white;
    padding:30px;
    border-radius:15px;
    cursor:pointer;
    color:#333;
    transition:0.3s;
}

.service-card:hover{
    transform:translateY(-8px);
}

.share-section{
    background:white;
    padding:40px;
    border-radius:20px;
    max-width:900px;
    margin:40px auto;
    color:black;
}

#sharePrice{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

footer{
    background:black;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>
<body>

<header>
<nav>
<div><b>Careloop</b></div>
<ul>
<li><a href="#home">ホーム</a></li>
<li><a href="#services">サービス</a></li>
<li><a href="#contact">お問い合わせ</a></li>
</ul>
</nav>
</header>

<section id="home">
<h1>ケアループへようこそ</h1>
</section>

<!-- ===== UPDATED REALISTIC SHARE MARKET SECTION ===== -->
<section>
<div class="share-section">
<h2>📈 Careloop Share Value (Live Market Simulation)</h2>
<div id="sharePrice">₹ 350.00</div>
<canvas id="shareChart"></canvas>
</div>
</section>
<!-- ===== END SHARE SECTION ===== -->

<section id="services">
<div class="services">
<div class="service-card">
<h3>🚚 訪問診療</h3>
</div>
<div class="service-card">
<h3>👨‍⚕️ 医師相談</h3>
</div>
<div class="service-card">
<h3>💪 理学療法</h3>
</div>
</div>
</section>

<footer>
<p>© 2026 ケアループ. 全著作権所有。</p>
</footer>

<script>

/* ===============================
   REALISTIC SHARE MARKET ENGINE
================================ */

let sharePrice = 350; // STARTING PRICE
let labels = [];
let dataPoints = [];

/* Monthly trend simulation from Jan 2024 */
let monthlyTrend = 0.8; // slow growth bias
let volatility = 1.2;   // small fluctuation

const ctx = document.getElementById('shareChart').getContext('2d');

const shareChart = new Chart(ctx, {
type: 'line',
data: {
labels: labels,
datasets: [{
label: 'Careloop NSE Share Price',
data: dataPoints,
borderColor: '#2e7d32',
backgroundColor: 'rgba(46,125,50,0.1)',
fill: true,
tension: 0.4
}]
},
options: {
responsive: true,
animation: false,
scales: {
y: {
beginAtZero: false
}
}
}
});

/* Generate gradual realistic movement */
function generateMarketMovement(){

    // small realistic fluctuation
    let randomFluctuation = (Math.random() - 0.5) * volatility;

    // gradual monthly growth logic
    sharePrice += randomFluctuation + (monthlyTrend / 30);

    // Prevent sudden crash
    if(sharePrice < 300){
        sharePrice = 300 + Math.random()*5;
    }

    document.getElementById("sharePrice").textContent =
        "₹ " + sharePrice.toFixed(2);

    let time = new Date().toLocaleTimeString();
    labels.push(time);
    dataPoints.push(sharePrice);

    if(labels.length > 60){
        labels.shift();
        dataPoints.shift();
    }

    shareChart.update();
}

/* Simulate real market (per second update) */
setInterval(generateMarketMovement, 1000);

</script>

</body>
</html>
