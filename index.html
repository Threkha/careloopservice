<script>

/* ===============================
   CONTROLLED MARKET SIMULATION
================================ */

/*
   Market Phases:
   2024 - Gradual Growth
   2025 - Strong Rally to ₹800
   Late 2025 - Controlled Correction
   2026 - Recovery around ₹358
*/

let sharePrice = 350; // Start January 2024
let labels = [];
let dataPoints = [];

let currentMonth = 0;  // simulate month progression
let tickPerMonth = 60; // 60 seconds = 1 month
let tickCount = 0;

const ctx = document.getElementById('shareChart').getContext('2d');

const shareChart = new Chart(ctx, {
type: 'line',
data: {
labels: labels,
datasets: [{
label: 'CARELOOP NSE Share Price (2024-2026)',
data: dataPoints,
borderColor: '#2e7d32',
backgroundColor: 'rgba(46,125,50,0.15)',
fill: true,
tension: 0.35
}]
},
options: {
responsive: true,
animation: false,
scales: {
y: {
beginAtZero: false
}
}
}
});

/* ===============================
   EXACT CONTROLLED TREND FUNCTION
================================ */

function getMonthlyTrend(monthIndex){

    // 2024 → gradual rise from 350 to 600
    if(monthIndex < 12){
        return 4; 
    }

    // Early 2025 strong rally to 800
    if(monthIndex >= 12 && monthIndex < 18){
        return 12;
    }

    // Late 2025 controlled correction (not crash)
    if(monthIndex >= 18 && monthIndex < 24){
        return -8;
    }

    // 2026 recovery & stabilization near 358-420
    return 3;
}

/* ===============================
   REAL MARKET MOVEMENT PER SECOND
================================ */

function generateMarketMovement(){

    tickCount++;

    if(tickCount >= tickPerMonth){
        currentMonth++;
        tickCount = 0;
    }

    let trend = getMonthlyTrend(currentMonth);

    // realistic small fluctuation like stock market
    let minuteVolatility = (Math.random() - 0.5) * 3;

    // controlled movement
    sharePrice += (trend / 30) + minuteVolatility;

    // prevent sudden crash
    if(sharePrice < 300){
        sharePrice = 300 + Math.random()*5;
    }

    // prevent unrealistic spike above 820
    if(sharePrice > 820){
        sharePrice = 800 + Math.random()*5;
    }

    document.getElementById("sharePrice").textContent =
        "₹ " + sharePrice.toFixed(2);

    let now = new Date();
    let timeLabel = now.toLocaleTimeString();

    labels.push(timeLabel);
    dataPoints.push(parseFloat(sharePrice.toFixed(2)));

    if(labels.length > 90){
        labels.shift();
        dataPoints.shift();
    }

    shareChart.update();
}

/* Start Live Simulation */
setInterval(generateMarketMovement,1000);

</script>
